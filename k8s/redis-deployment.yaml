apiVersion: apps/v1
kind: Deployment
metadata:
  name: astra-redis
  labels:
    app.kubernetes.io/name: astra-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: astra-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: astra-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: astra-redis
spec:
  selector:
    app.kubernetes.io/name: astra-redis
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  type: ClusterIP
