# Chaos Engineering Experiments for Astra OS
# Using LitmusChaos / Chaos Mesh
# Install: kubectl apply -f https://litmuschaos.github.io/litmus/litmus-operator-v3.0.0.yaml

---
# Experiment 1: Pod Kill - Test agent orchestrator resilience
apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: pod-kill-agent-orchestrator
  namespace: astra-production
spec:
  appinfo:
    appns: astra-production
    applabel: "app=astra-worker"
  chaosServiceAccount: litmus-admin
  experiments:
    - name: pod-delete
      spec:
        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: '30'
            - name: CHAOS_INTERVAL
              value: '10'
            - name: FORCE
              value: 'false'
            - name: PODS_AFFECTED_PERC
              value: '50'
---
# Experiment 2: Network Latency - Test circuit breaker behavior
apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: network-latency-model-router
  namespace: astra-production
spec:
  appinfo:
    appns: astra-production
    applabel: "app=astra-api"
  chaosServiceAccount: litmus-admin
  experiments:
    - name: network-latency
      spec:
        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: '60'
            - name: CHAOS_INTERVAL
              value: '10'
            - name: NETWORK_LATENCY
              value: '2000'  # 2 seconds
            - name: NETWORK_JITTER
              value: '500'
            - name: TARGET_CONTAINER
              value: 'api'
---
