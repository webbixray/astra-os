apiVersion: apps/v1
kind: Deployment
metadata:
  name: astra-temporal
  labels:
    app.kubernetes.io/name: astra-temporal
    app.kubernetes.io/component: temporal
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: astra-temporal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: astra-temporal
    spec:
      securityContext:
        runAsNonRoot: false
      containers:
        - name: temporal
          image: temporalio/auto-setup:1.24
          ports:
            - containerPort: 7233
              name: rpc
            - containerPort: 8233
              name: web
          env:
            - name: POSTGRES_SEEDS
              value: astra-postgres
            - name: POSTGRES_USER
              value: astra
            - name: POSTGRES_PWD
              valueFrom:
                secretKeyRef:
                  name: astra-secrets
                  key: postgres-password
            - name: POSTGRES_DB
              value: astra_temporal
            - name: DYNAMIC_CONFIG_FILE_PATH
              value: config/dynamicconfig/development-sql.yaml
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          livenessProbe:
            exec:
              command:
                - temporal
                - operator
                - cluster
                - health
                - --address
                - localhost:7233
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - temporal
                - operator
                - cluster
                - health
                - --address
                - localhost:7233
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: dynamic-config
              mountPath: /etc/temporal/config/dynamicconfig
      volumes:
        - name: dynamic-config
          configMap:
            name: astra-temporal-dynamic-config
---
apiVersion: v1
kind: Service
metadata:
  name: astra-temporal
  labels:
    app.kubernetes.io/name: astra-temporal
spec:
  selector:
    app.kubernetes.io/name: astra-temporal
  ports:
    - port: 7233
      targetPort: 7233
      name: rpc
    - port: 8233
      targetPort: 8233
      name: web
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: astra-temporal-dynamic-config
  labels:
    app.kubernetes.io/name: astra-temporal
data:
  development-sql.yaml: |
    system.forceSearchAttributesCacheRefreshOnRead:
      - value: true
        constraints: {}
    history.numHistoryShards:
      - value: 4
        constraints: {}
    worker.replicaCount:
      - value: 1
        constraints: {}
    matching.numTaskQueuePartitions:
      - value: 4
        constraints: {}
    enableActivityEagerExecution:
      - value: false
        constraints: {}
    enableNexusOperations:
      - value: true
        constraints: {}
