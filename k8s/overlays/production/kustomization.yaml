apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: astra

resources:
  - ../../base

commonLabels:
  environment: production

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: astra-api
      spec:
        replicas: 3
        template:
          spec:
            containers:
              - name: astra-api
                env:
                  - name: ENVIRONMENT
                    value: "production"
                resources:
                  requests:
                    memory: "2Gi"
                    cpu: "1000m"
                  limits:
                    memory: "4Gi"
                    cpu: "4000m"
    target:
      kind: Deployment
      name: astra-api
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: astra-web
      spec:
        replicas: 3
        template:
          spec:
            containers:
              - name: astra-web
                env:
                  - name: NODE_ENV
                    value: "production"
                resources:
                  requests:
                    memory: "1Gi"
                    cpu: "500m"
                  limits:
                    memory: "2Gi"
                    cpu: "2000m"
    target:
      kind: Deployment
      name: astra-web
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: astra-worker
      spec:
        replicas: 5
        template:
          spec:
            containers:
              - name: astra-worker
                env:
                  - name: ENVIRONMENT
                    value: "production"
                resources:
                  requests:
                    memory: "1Gi"
                    cpu: "500m"
                  limits:
                    memory: "2Gi"
                    cpu: "2000m"
    target:
      kind: Deployment
      name: astra-worker

configMapGenerator:
  - name: astra-config
    behavior: merge
    literals:
      - ENVIRONMENT=production
      - CORS_ORIGINS=https://app.astra.com
      - APP_VERSION=production

images:
  - name: astra-api
    newName: astraos/api
    newTag: latest
  - name: astra-web
    newName: astraos/web
    newTag: latest

replacements:
  - source:
      kind: ConfigMap
      name: astra-config
    targets:
      - select:
          kind: Deployment
          name: astra-api
        fieldPaths:
          - spec.template.spec.containers.[name=astra-api].env.[name=ENVIRONMENT].value
      - select:
          kind: Deployment
          name: astra-web
        fieldPaths:
          - spec.template.spec.containers.[name=astra-web].env.[name=NODE_ENV].value