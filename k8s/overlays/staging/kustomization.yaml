apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: astra-staging

resources:
  - ../../namespace.yaml
  - ../../postgres-statefulset.yaml
  - ../../redis-deployment.yaml
  - ../../api-deployment.yaml
  - ../../web-deployment.yaml
  - ../../temporal-deployment.yaml
  - ../../worker-deployment.yaml
  - ../../ingress.yaml
  - ../../hpa.yaml

commonLabels:
  environment: staging

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: astra-api
      spec:
        replicas: 2
        template:
          spec:
            containers:
              - name: api
                env:
                  - name: ENVIRONMENT
                    value: "staging"
                resources:
                  requests:
                    memory: "1Gi"
                    cpu: "500m"
                  limits:
                    memory: "2Gi"
                    cpu: "2000m"
    target:
      kind: Deployment
      name: astra-api
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: astra-web
      spec:
        replicas: 2
        template:
          spec:
            containers:
              - name: web
                env:
                  - name: NODE_ENV
                    value: "production"
                resources:
                  requests:
                    memory: "512Mi"
                    cpu: "250m"
                  limits:
                    memory: "1Gi"
                    cpu: "1000m"
    target:
      kind: Deployment
      name: astra-web
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: astra-worker
      spec:
        replicas: 2
        template:
          spec:
            containers:
              - name: worker
                env:
                  - name: ENVIRONMENT
                    value: "staging"
                resources:
                  requests:
                    memory: "512Mi"
                    cpu: "250m"
                  limits:
                    memory: "1Gi"
                    cpu: "1000m"
    target:
      kind: Deployment
      name: astra-worker

configMapGenerator:
  - name: astra-config
    behavior: merge
    literals:
      - ENVIRONMENT=staging
      - CORS_ORIGINS=https://staging.astra.com
      - APP_VERSION=staging

images:
  - name: astra-api
    newName: ghcr.io/webbixray/astra-os/api
    newTag: staging
  - name: astra-web
    newName: ghcr.io/webbixray/astra-os/web
    newTag: staging
  - name: astra-worker
    newName: ghcr.io/webbixray/astra-os/worker
    newTag: staging

replacements:
  - source:
      kind: ConfigMap
      name: astra-config
    targets:
      - select:
          kind: Deployment
          name: astra-api
        fieldPaths:
          - spec.template.spec.containers.[name=astra-api].env.[name=ENVIRONMENT].value
      - select:
          kind: Deployment
          name: astra-web
        fieldPaths:
          - spec.template.spec.containers.[name=astra-web].env.[name=NODE_ENV].value
