apiVersion: apps/v1
kind: Deployment
metadata:
  name: astra-worker
  labels:
    app.kubernetes.io/name: astra-worker
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: astra-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: astra-worker
    spec:
      serviceAccountName: astra-worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 120
      containers:
        - name: worker
          image: astra-api
          imagePullPolicy: Always
          command: ["python", "-m", "app.infrastructure.temporal.worker"]
          envFrom:
            - configMapRef:
                name: astra-config
            - secretRef:
                name: astra-secrets
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: astra-secrets
                  key: database-url
            - name: REDIS_URL
              value: redis://astra-redis:6379/0
            - name: TEMPORAL_HOST
              value: astra-temporal:7233
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import sys; sys.exit(0)"
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - "import sys; sys.exit(0)"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: astra-worker
  labels:
    app.kubernetes.io/name: astra-worker
