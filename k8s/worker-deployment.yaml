apiVersion: apps/v1
kind: Deployment
metadata:
  name: astra-worker
  labels:
    app.kubernetes.io/name: astra-worker
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: astra-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: astra-worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/health"
    spec:
      serviceAccountName: astra-worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      priorityClassName: astra-high
      terminationGracePeriodSeconds: 120
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: astra-worker
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: astra-worker
      containers:
        - name: worker
          image: astra-worker
          imagePullPolicy: Always
          command: ["python", "-m", "app.infrastructure.temporal.worker"]
          envFrom:
            - configMapRef:
                name: astra-config
            - secretRef:
                name: astra-secrets
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: astra-secrets
                  key: database-url
            - name: REDIS_URL
              value: redis://astra-redis:6379/0
            - name: TEMPORAL_HOST
              value: astra-temporal:7233
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import sys; sys.exit(0)"
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - "import sys; sys.exit(0)"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /var/cache
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: astra-worker
  labels:
    app.kubernetes.io/name: astra-worker
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: astra-worker-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: astra-worker
