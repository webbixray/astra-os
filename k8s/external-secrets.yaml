  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: astra/production/worker
        property: database_url
    - secretKey: REDIS_URL
      remoteRef:
        key: astra/production/worker
        property: redis_url
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: astra/production/worker
        property: openai_api_key
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: astra/production/worker
        property: anthropic_api_key
    - secretKey: NVIDIA_NIM_API_KEY
      remoteRef:
        key: astra/production/worker
        property: nvidia_nim_api_key
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgresql-secrets
  namespace: astra-production
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: postgresql-secrets
    creationPolicy: Owner
  data:
    - secretKey: postgres-password
      remoteRef:
        key: astra/production/postgresql
        property: password
    - secretKey: replication-password
      remoteRef:
        key: astra/production/postgresql
        property: replication_password
---
