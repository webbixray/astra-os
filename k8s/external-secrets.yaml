---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: monitoring-secrets
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: monitoring-secrets
    creationPolicy: Owner
  data:
    - secretKey: grafana-admin-password
      remoteRef:
        key: astra/production/monitoring
        property: grafana_password
    - secretKey: alertmanager-config
      remoteRef:
        key: astra/production/monitoring
        property: alertmanager_config
    - secretKey: slack-webhook-url
      remoteRef:
        key: astra/production/monitoring
        property: slack_webhook
    - secretKey: pagerduty-key
      remoteRef:
        key: astra/production/monitoring
        property: pagerduty_key