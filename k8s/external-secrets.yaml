apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "https://vault.astra-os.io"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "astra-external-secrets"
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: astra-api-secrets
  namespace: astra-production
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: astra-api-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: astra/production/api
        property: database_url
    - secretKey: REDIS_URL
      remoteRef:
        key: astra/production/api
        property: redis_url
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: astra/production/api
        property: openai_api_key
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: astra/production/api
        property: anthropic_api_key
    - secretKey: NVIDIA_NIM_API_KEY
      remoteRef:
        key: astra/production/api
        property: nvidia_nim_api_key
    - secretKey: JWT_SECRET
      remoteRef:
        key: astra/production/api
        property: jwt_secret
    - secretKey: ENCRYPTION_KEY
      remoteRef:
        key: astra/production/api
        property: encryption_key
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: astra-worker-secrets
  namespace: astra-production
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: astra-worker-secrets
