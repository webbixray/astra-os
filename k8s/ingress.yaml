apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: astra-ingress
  labels:
    app.kubernetes.io/name: astra-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
spec:
  tls:
    - hosts:
        - app.astra.com
      secretName: astra-tls
  ingressClassName: nginx
  rules:
    - host: app.astra.com
      http:
        paths:
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: astra-api
                port:
                  number: 8000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: astra-api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: astra-web
                port:
                  number: 3000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: astra-network-policy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: astra
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8000
        - port: 3000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: astra-postgres
      ports:
        - port: 5432
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: astra-redis
      ports:
        - port: 6379
