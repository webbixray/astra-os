apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: astra

resources:
  - namespace.yaml
  - priority-classes.yaml
  - postgres-statefulset.yaml
  - redis-deployment.yaml
  - api-deployment.yaml
  - web-deployment.yaml
  - temporal-deployment.yaml
  - worker-deployment.yaml
  - ingress.yaml
  - hpa.yaml
  - network-policies.yaml
  - kyverno-policies.yaml
  - external-secrets.yaml

configMapGenerator:
  - name: astra-config
    literals:
      - ENVIRONMENT=production
      - CORS_ORIGINS=https://app.astra.com
      - APP_VERSION=0.0.1

secretGenerator:
  - name: astra-secrets
    literals:
      - SECRET_KEY=change-me-in-production
      - POSTGRES_PASSWORD=change-me-in-production
    options:
      disableNameSuffixHash: true

images:
  - name: astra-api
    newName: astraos/api
    newTag: latest
  - name: astra-web
    newName: astraos/web
    newTag: latest
