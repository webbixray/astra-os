apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: astra-postgres
  labels:
    app.kubernetes.io/name: astra-postgres
spec:
  serviceName: astra-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: astra-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: astra-postgres
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: astra
            - name: POSTGRES_USER
              value: astra
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: astra-secrets
                  key: postgres-password
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "astra"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "astra"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
              subPath: postgres
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi
        storageClassName: standard
---
apiVersion: v1
kind: Service
metadata:
  name: astra-postgres
  labels:
    app.kubernetes.io/name: astra-postgres
spec:
  selector:
    app.kubernetes.io/name: astra-postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  clusterIP: None
