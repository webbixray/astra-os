---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-image-signature
  annotations:
    policies.kyverno.io/title: Require Image Signature Verification
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: high
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: verify-image-signature
      match:
        any:
          - resources:
              kinds:
                - Pod
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
                - CronJob
      verifyImages:
        - imageReferences:
            - "ghcr.io/*"
          key: |
            -----BEGIN PUBLIC KEY-----
            ${{ secrets.COSIGN_PUBLIC_KEY }}
            -----END PUBLIC KEY-----
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-host-namespace
  annotations:
    policies.kyverno.io/title: Restrict Host Namespace Usage
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: high
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: no-host-network
      match:
        any:
          - resources:
              kinds:
                - Pod
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
                - CronJob
      validate:
        message: "Host network is not allowed"
        deny:
          conditions:
            - all:
                - key: "{{ spec.hostNetwork }}"
                  operator: Equals
                  value: true
    - name: no-host-pid
      match:
        any:
          - resources:
              kinds:
                - Pod
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
                - CronJob
      validate:
        message: "Host PID is not allowed"
        deny:
          conditions:
            - all:
                - key: "{{ spec.hostPID }}"
                  operator: Equals
                  value: true
    - name: no-host-ipc
      match:
        any:
          - resources:
              kinds:
                - Pod
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
                - CronJob
      validate:
        message: "Host IPC is not allowed"
        deny:
          conditions:
            - all:
                - key: "{{ spec.hostIPC }}"
                  operator: Equals
                  value: true
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-latest-image-tag-prohibited
  annotations:
    policies.kyverno.io/title: Prohibit Latest Image Tag
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: medium
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: no-latest-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
                - CronJob
      validate:
        message: "Using 'latest' tag is not allowed. Use specific version tags."
        deny:
          conditions:
            - all:
                - key: "{{ spec.containers[*].image }}"
                  operator: Matches
                  value: ".*:latest$"