---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-network-policy
  annotations:
    policies.kyverno.io/title: Require Network Policy
    policies.kyverno.io/category: Network Security
    policies.kyverno.io/severity: medium
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: check-network-policy
      match:
        any:
          - resources:
              kinds:
                - Namespace
      validate:
        message: "Namespace should have a NetworkPolicy"
        pattern:
          metadata:
            labels:
              network-policy: "?*"
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-pod-disruption-budget
  annotations:
    policies.kyverno.io/title: Require Pod Disruption Budget
    policies.kyverno.io/category: Reliability
    policies.kyverno.io/severity: medium
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: check-pdb
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
      validate:
        message: "Workload should have a PodDisruptionBudget"
