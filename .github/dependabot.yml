# GitHub Dependabot Configuration
# Create at: .github/dependabot.yml

version: 2
updates:
  # Python dependencies (API)
  - package-ecosystem: "pip"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "[deps/python]"
    pull-request-branch-name:
      separator: "-"
    open-pull-requests-limit: 10
    reviewers:
      - "team/platform"
    assignees:
      - "platform-team"
    # Group updates for minor/patch
    groups:
      dev-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    # Ignore major updates for core dependencies
    ignore:
      - dependency-name: "fastapi"
        update-types: ["version-update:semver-major"]
      - dependency-name: "sqlalchemy"
        update-types: ["version-update:semver-major"]
      - dependency-name: "pydantic"
        update-types: ["version-update:semver-major"]

  # Python dependencies (Agent Orchestrator)
  - package-ecosystem: "pip"
    directory: "/services/agent_orchestrator"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "[deps/python-services]"

  # Node.js dependencies (Web)
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "nodejs"
    commit-message:
      prefix: "[deps/web]"
    pull-request-branch-name:
      separator: "-"
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        patterns:
          - "@types/*"
          - "eslint*"
          - "prettier*"
          - "vitest*"
          - "@testing-library/*"
        update-types:
          - "minor"
          - "patch"

  # Node.js dependencies (Root workspace)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:30"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "nodejs"
    commit-message:
      prefix: "[deps/root]"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "06:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "[deps/docker/api]"

  - package-ecosystem: "docker"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "06:30"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "[deps/docker/web]"

  - package-ecosystem: "docker"
    directory: "/services/agent_orchestrator"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "07:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "[deps/docker/worker]"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "06:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "[deps/gha]"

# Additional security-focused settings
# Enable vulnerability alerts for all ecosystems
# This is configured in GitHub repository settings > Security > Dependabot alerts