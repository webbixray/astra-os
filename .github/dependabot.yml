# Dependabot configuration for automated dependency updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps):"
      include: "scope"
    open-pull-requests-limit: 10
    reviewers:
      - "astra-os/api-team"
      - "astra-os/agents-team"
    assignees:
      - "dependabot-bot"
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"
    ignore:
      - dependency-name: "astra-cli"
        # Local package, not on PyPI

  # Python dependencies in apps/cli
  - package-ecosystem: "pip"
    directory: "/apps/cli"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "python"
      - "cli"
    commit-message:
      prefix: "chore(deps):"
      include: "scope"
    reviewers:
      - "astra-os/cli-team"
    open-pull-requests-limit: 5

  # Python dependencies in services/agent_orchestrator
  - package-ecosystem: "pip"
    directory: "/services/agent_orchestrator"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "python"
      - "agent-orchestrator"
    commit-message:
      prefix: "chore(deps):"
      include: "scope"
    reviewers:
      - "astra-os/agents-team"
    open-pull-requests-limit: 5

  # JavaScript/TypeScript dependencies (pnpm workspace)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "javascript"
      - "typescript"
    commit-message:
      prefix: "chore(deps):"
      include: "scope"
    open-pull-requests-limit: 10
    reviewers:
      - "astra-os/web-team"
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps):"
      include: "scope"
    reviewers:
      - "astra-os/platform-team"
    open-pull-requests-limit: 5

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(deps):"
      include: "scope"
    reviewers:
      - "astra-os/platform-team"
    open-pull-requests-limit: 5