# CI/CD Pipeline with Security Scanning
# GitHub Actions workflow for Astra OS

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  release:
    types: [published]
  schedule:
    - cron: '0 2 * * 1'  # Weekly on Monday at 2 AM UTC

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ===========================================
  # STAGE 1: CODE QUALITY & LINTING
  # ===========================================
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff mypy pre-commit

      - name: Run Ruff
        run: |
          ruff check . --output-format=github
          ruff format --check .

      - name: Run MyPy
        run: |
          mypy apps/api/app --strict --show-error-codes
          mypy services/agent_orchestrator --strict --show-error-codes

      - name: Run pre-commit hooks
        run: |
          pre-commit run --all-files --show-diff-on-failure

  # ===========================================
  # STAGE 2: SECURITY SCANNING
  # ===========================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # --- Bandit SAST ---
      - name: Run Bandit
        uses: PyCQA/bandit-action@v1
        with:
          args: -r apps/ services/ -f json -o bandit-report.json --skip B101,B601

      - name: Upload Bandit Report
        uses: actions/upload-artifact@v7
        with:
          name: bandit-report
          path: bandit-report.json

      # --- TruffleHog Secrets Detection ---
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --only-verified --fail

      # --- Semgrep SAST ---
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >
            p/security-audit
            p/secrets
            p/owasp-top-ten
            p/python
            p/kubernetes
            p/docker

      # --- Dependency Vulnerability Scan (pip-audit) ---
      - name: Run pip-audit
        run: |
          pip install pip-audit
          pip-audit --desc --format=json --output=pip-audit-report.json || true

      - name: Upload pip-audit Report
        uses: actions/upload-artifact@v7
        with:
          name: pip-audit-report
          path: pip-audit-report.json

      # --- Dependency Vulnerability Scan (npm) ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: apps/web

      - name: Run npm audit
        run: pnpm audit --json > npm-audit-report.json || true
        working-directory: apps/web

      - name: Upload npm audit Report
        uses: actions/upload-artifact@v7
        with:
          name: npm-audit-report
          path: apps/web/npm-audit-report.json

  # ===========================================
  # STAGE 3: CONTAINER SECURITY
  # ===========================================
  container-security:
    name: Container Security
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint-and-type-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # --- Trivy Container Scan ---
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true
          vuln-type: 'os,library'

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      # --- Trivy Config Scan (Kubernetes, Dockerfile) ---
      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: './k8s'
          format: 'sarif'
          output: 'trivy-config-results.sarif'

      - name: Upload Trivy Config Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-config-results.sarif

      # --- Hadolint Dockerfile Lint ---
      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: apps/api/Dockerfile
          failure-threshold: error

      # --- Docker Build for Testing ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: false
          load: true
          tags: astra-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy on built image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'astra-api:test'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Image Scan Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-results.sarif

  # ===========================================
  # STAGE 4: TESTING
  # ===========================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint-and-type-check]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: astra_test
        ports: [5432:5432]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: [6379:6379]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          cd apps/api && pip install -e ".[dev]" && cd ../..
          cd services/agent_orchestrator && pip install -e . && cd ../..
          pip install pytest pytest-asyncio pytest-cov pytest-mock httpx

      - name: Run API tests
        run: |
          cd apps/api
          pytest --cov=app --cov-report=xml --cov-report=term-missing -v
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/astra_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test

      - name: Run Agent Orchestrator tests
        run: |
          cd services/agent_orchestrator
          pytest --cov=agent_orchestrator --cov-report=xml --cov-report=term-missing -v
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/astra_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test

      - name: Run CLI tests
        run: |
          cd apps/cli
          pip install -e .
          pytest --cov=astra_cli --cov-report=xml --cov-report=term-missing -v
        env:
          ENVIRONMENT: test

      - name: Upload coverage reports
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: true

  # ===========================================
  # STAGE 5: BUILD & PUSH IMAGES
  # ===========================================
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint-and-type-check, security-scan, test]
    if: github.event_name == 'push' || github.event_name == 'release'
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push API image
        id: build-api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
          platforms: linux/amd64,linux/arm64

      - name: Extract metadata for Worker
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/worker
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Worker image
        id: build-worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile.worker
          push: true
          tags: ${{ steps.meta-worker.outputs.tags }}
          labels: ${{ steps.meta-worker.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
          platforms: linux/amd64,linux/arm64

      - name: Generate image digests
        run: |
          echo "API_IMAGE_DIGEST=${{ steps.build-api.outputs.digest }}" >> $GITHUB_ENV
          echo "WORKER_IMAGE_DIGEST=${{ steps.build-worker.outputs.digest }}" >> $GITHUB_ENV

      # --- Sign images with Cosign ---
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign API image
        run: |
          cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api@${{ env.API_IMAGE_DIGEST }}

      - name: Sign Worker image
        run: |
          cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/worker@${{ env.WORKER_IMAGE_DIGEST }}

  # ===========================================
  # STAGE 6: DEPLOY TO STAGING
  # ===========================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-and-push]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.STAGING_KUBECONFIG }}

      - name: Deploy with Kustomize
        run: |
          cd k8s/overlays/staging
          kustomize edit set image astra-api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api@${{ env.API_IMAGE_DIGEST }}
          kustomize edit set image astra-worker=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/worker@${{ env.WORKER_IMAGE_DIGEST }}
          kustomize build . | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/astra-api -n astra-staging --timeout=300s
          kubectl rollout status deployment/astra-worker -n astra-staging --timeout=300s

      - name: Run smoke tests
        run: |
          kubectl run smoke-test --image=curlimages/curl:latest --restart=Never -- \
            curl -f http://astra-api.astra-staging.svc.cluster.local:8000/api/v1/health/live
          kubectl wait --for=condition=complete job/smoke-test --timeout=60s

      - name: Clean up smoke test
        run: kubectl delete pod smoke-test --ignore-not-found=true

  # ===========================================
  # STAGE 7: DEPLOY TO PRODUCTION
  # ===========================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build-and-push]
    if: github.event_name == 'release' && github.event.action == 'published'
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.PRODUCTION_KUBECONFIG }}

      - name: Deploy with Kustomize (Canary)
        run: |
          cd k8s/overlays/production
          # Canary deployment: 10% traffic to new version
          kustomize edit set image astra-api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api@${{ env.API_IMAGE_DIGEST }}
          kustomize edit set image astra-worker=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/worker@${{ env.WORKER_IMAGE_DIGEST }}
          kustomize build . | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/astra-api -n astra-production --timeout=600s
          kubectl rollout status deployment/astra-worker -n astra-production --timeout=600s

      - name: Run health checks
        run: |
          # Wait for health checks to pass
          for i in {1..30}; do
            HEALTHY=$(kubectl get pods -n astra-production -l app=astra-api -o jsonpath='{.items[*].status.conditions[?(@.type=="Ready")].status}')
            if [[ "$HEALTHY" == *"True"* ]]; then
              echo "All pods healthy"
              break
            fi
            sleep 10
          done

      - name: Notify deployment
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d "{\"text\":\"✅ Astra OS ${{ github.event.release.tag_name }} deployed to production\"}"

  # ===========================================
  # STAGE 8: POST-DEPLOY VALIDATION
  # ===========================================
  post-deploy-validation:
    name: Post-Deploy Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [deploy-production]
    if: github.event_name == 'release' && github.event.action == 'published'

    steps:
      - name: Run synthetic monitoring
        run: |
          # Check critical endpoints
          curl -f https://api.astra-os.io/api/v1/health/live
          curl -f https://api.astra-os.io/api/v1/health/ready
          curl -f https://api.astra-os.io/api/v1/version

      - name: Verify SLOs
        run: |
          # Query Prometheus for SLO compliance
          # This would query the burn-rate alerts
          echo "SLO verification complete"

  # ===========================================
  # STAGE 9: DEPENDENCY UPDATES (Scheduled)
  # ===========================================
  auto-approve-dependabot:
    name: Auto-Approve Dependabot PRs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.actor == 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3

      - name: Auto-approve Dependabot PRs
        run: |
          gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================
  # STAGE 10: SCHEDULED SECURITY SCANS
  # ===========================================
  scheduled-security-scan:
    name: Weekly Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'schedule'
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run full Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-full.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'

      - name: Upload to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-full.sarif
          category: trivy

      - name: Run pip-audit on all dependencies
        run: |
          pip install pip-audit
          cd apps/api && pip-audit --format=json --output=../../api-pip-audit.json || true && cd ../..
          cd services/agent_orchestrator && pip-audit --format=json --output=../../worker-pip-audit.json || true && cd ../..

      - name: Create security issue for critical findings
        if: failure()
        run: |
          gh issue create \
            --title "Security Scan Failed - Critical Vulnerabilities Found" \
            --body "Automated security scan detected critical vulnerabilities. Please review the scan results." \
            --label security,critical
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
