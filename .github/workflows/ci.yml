name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================================
  # CODE QUALITY & LINTING
  # ============================================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install ruff mypy pre-commit

      - name: Run Ruff
        run: |
          ruff check . --output-format=github
          ruff format --check .

      - name: Run MyPy
        run: |
          mypy apps/api/app services/agent_orchestrator --strict

      - name: Run Pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  # ============================================================
  # SECURITY SCANNING
  # ============================================================
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install security tools
        run: |
          pip install bandit semgrep trufflehog pip-audit

      - name: Run Bandit (Python SAST)
        id: bandit
        run: |
          bandit -r apps/api/app services/agent_orchestrator -f json -o bandit-results.json || true
          bandit -r apps/api/app services/agent_orchestrator -f txt

      - name: Upload Bandit results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit-results.json
          category: bandit

      - name: Run Semgrep (SAST)
        id: semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten
            p/python
          generateSarif: true

      - name: Run TruffleHog (Secrets)
        id: trufflehog
        run: |
          trufflehog git file://. --only-verified --fail --json > trufflehog-results.json || true
          cat trufflehog-results.json | jq -r '. | select(.verified == true)' | wc -l

      - name: Run pip-audit (Dependency Vulnerabilities)
        id: pip-audit
        run: |
          pip-audit --desc --format=json --output=pip-audit-results.json || true
          pip-audit --desc

      - name: Upload pip-audit results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: pip-audit-results.json
          category: pip-audit

  # ============================================================
  # CONTAINER SECURITY
  # ============================================================
  container-security:
    name: Container Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images
        run: |
          docker build -t astra-api:test -f apps/api/Dockerfile .
          docker build -t astra-worker:test -f services/agent_orchestrator/Dockerfile .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          scan-ref: 'astra-api:test'
          format: 'sarif'
          output: 'trivy-api-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Run Trivy on worker
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          scan-ref: 'astra-worker:test'
          format: 'sarif'
          output: 'trivy-worker-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results (API)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api-results.sarif
          category: trivy-api

      - name: Upload Trivy results (Worker)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-worker-results.sarif
          category: trivy-worker

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: apps/api/Dockerfile

      - name: Run Hadolint (Worker)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: services/agent_orchestrator/Dockerfile

  # ============================================================
  # SBOM GENERATION
  # ============================================================
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Python SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom-python.spdx.json

      - name: Generate Container SBOM
        run: |
          docker build -t astra-api:sbom -f apps/api/Dockerfile .
          syft astra-api:sbom -o spdx-json=sbom-container.spdx.json

      - name: Upload SBOMs
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom-python.spdx.json
            sbom-container.spdx.json

  # ============================================================
  # IMAGE SIGNING (COSIGN)
  # ============================================================
  sign:
    name: Sign Images
    needs: [container-security, sbom]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Cosign
        uses: sigstore/cosign-installer@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        run: |
          docker buildx build --push \
            -t ghcr.io/${{ github.repository }}/api:${{ github.sha }} \
            -t ghcr.io/${{ github.repository }}/api:latest \
            -f apps/api/Dockerfile .

      - name: Build and push Worker image
        run: |
          docker buildx build --push \
            -t ghcr.io/${{ github.repository }}/worker:${{ github.sha }} \
            -t ghcr.io/${{ github.repository }}/worker:latest \
            -f services/agent_orchestrator/Dockerfile .

      - name: Sign API image
        run: |
          cosign sign --yes ghcr.io/${{ github.repository }}/api:${{ github.sha }}

      - name: Sign Worker image
        run: |
          cosign sign --yes ghcr.io/${{ github.repository }}/worker:${{ github.sha }}

      - name: Attach SBOM to API image
        run: |
          cosign attach sbom --sbom sbom-container.spdx.json ghcr.io/${{ github.repository }}/api:${{ github.sha }}

  # ============================================================
  # TESTS
  # ============================================================
  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: astra_test
        ports: [5432:5432]
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: [6379:6379]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run database migrations
        run: |
          cd apps/api && alembic upgrade head
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/astra_test

      - name: Run unit tests
        run: |
          pytest tests/unit -v --cov=apps/api --cov=services --cov-report=xml
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/astra_test
          REDIS_URL: redis://localhost:6379/0

      - name: Run integration tests
        run: |
          pytest tests/integration -v
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/astra_test
          REDIS_URL: redis://localhost:6379/0

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ============================================================
  # KUBERNETES POLICY CHECK (KYVERNO)
  # ============================================================
  k8s-policy:
    name: K8s Policy Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Kyverno CLI
        run: |
          curl -sSL https://github.com/kyverno/kyverno/releases/latest/download/kyverno-cli_linux_x86_64.tar.gz | tar xz
          sudo mv kyverno /usr/local/bin/

      - name: Validate K8s manifests
        run: |
          kyverno apply k8s/ --dry-run --output=json > kyverno-results.json || true

      - name: Check for policy violations
        run: |
          cat kyverno-results.json | jq -r '.results[] | select(.pass == false) | .message' | wc -l

  # ============================================================
  # DEPLOY TO STAGING
  # ============================================================
  deploy-staging:
    name: Deploy to Staging
    needs: [lint, security, container-security, sbom, test, k8s-policy]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Staging
        run: |
          echo "Deploying to staging via ArgoCD..."
          # argocd app sync astra-staging --prune

  # ============================================================
  # DEPLOY TO PRODUCTION (with approval)
  # ============================================================
  deploy-production:
    name: Deploy to Production
    needs: [lint, security, container-security, sbom, sign, test, k8s-policy]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Production
        run: |
          echo "Deploying to production via ArgoCD..."
          # argocd app sync astra-production --prune --auto-prune

      - name: Verify deployment
        run: |
          echo "Running post-deployment health checks..."
          # curl -f https://api.astra-os.io/health/live
          # curl -f https://api.astra-os.io/health/ready