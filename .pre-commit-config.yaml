# Pre-commit hooks for Astra OS
# Install: pip install pre-commit && pre-commit install

repos:
  # Python code quality - use local hooks to avoid GitHub auth
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: ruff
        language: system
        types: [python]
        args: [check, --fix, --exit-non-zero-on-fix]
        exclude: apps/api/alembic/
        pass_filenames: false
      - id: ruff-format
        name: ruff-format
        entry: ruff
        language: system
        types: [python]
        args: [format]
        exclude: apps/api/alembic/
        pass_filenames: false

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy
        language: system
        types: [python]
        args: [--strict]
        pass_filenames: false

  # Security
  - repo: local
    hooks:
      - id: bandit
        name: bandit
        entry: bandit
        language: system
        types: [python]
        args: [-r, --skip, B101,B601]
        pass_filenames: false

      - id: trufflehog
        name: trufflehog
        entry: trufflehog
        language: system
        types: [text]
        args: [git, file://., --only-verified]
        pass_filenames: false

      - id: pip-audit
        name: pip-audit
        entry: pip-audit
        language: system
        types: [python]
        args: [--desc]
        pass_filenames: false

  # General
  - repo: local
    hooks:
      - id: trailing-whitespace
        name: trailing-whitespace
        entry: trailing-whitespace-fixer
        language: system
        types: [text]
        pass_filenames: false
      - id: end-of-file-fixer
        name: end-of-file-fixer
        entry: end-of-file-fixer
        language: system
        types: [text]
        pass_filenames: false
      - id: check-yaml
        name: check-yaml
        entry: check-yaml
        language: system
        types: [yaml]
        pass_filenames: false
      - id: check-toml
        name: check-toml
        entry: check-toml
        language: system
        types: [toml]
        pass_filenames: false
      - id: check-json
        name: check-json
        entry: check-json
        language: system
        types: [json]
        pass_filenames: false
      - id: check-merge-conflict
        name: check-merge-conflict
        entry: check-merge-conflict
        language: system
        types: [text]
        pass_filenames: false
      - id: check-added-large-files
        name: check-added-large-files
        entry: check-added-large-files
        language: system
        types: [text]
        args: [--maxkb=500]
        pass_filenames: false

  # Commit message linting - use local to avoid GitHub
  - repo: local
    hooks:
      - id: commitlint
        name: commitlint
        entry: commitlint
        language: system
        stages: [commit-msg]
        pass_filenames: false

  # Dockerfile linting
  - repo: local
    hooks:
      - id: hadolint
        name: hadolint
        entry: hadolint
        language: system
        types: [dockerfile]
        args: [--ignore, DL3008, --ignore, DL3009]
        pass_filenames: false

  # Markdown linting
  - repo: local
    hooks:
      - id: markdownlint
        name: markdownlint
        entry: markdownlint
        language: system
        types: [markdown]
        args: [--config, .markdownlint.json]
        pass_filenames: false

  # YAML linting
  - repo: local
    hooks:
      - id: yamllint
        name: yamllint
        entry: yamllint
        language: system
        types: [yaml]
        args: [-c, .yamllint.yaml]
        pass_filenames: false

  # Kubernetes manifests
  - repo: local
    hooks:
      - id: kubelint
        name: kubelint
        entry: kubelint
        language: system
        types: [yaml]
        args: [--strict]
        exclude: k8s/
        pass_filenames: false

  # Terraform
  - repo: local
    hooks:
      - id: terraform_fmt
        name: terraform_fmt
        entry: terraform
        language: system
        args: [fmt]
        types: [terraform]
        pass_filenames: false
      - id: terraform_validate
        name: terraform_validate
        entry: terraform
        language: system
        args: [validate]
        types: [terraform]
        pass_filenames: false
      - id: tflint
        name: tflint
        entry: tflint
        language: system
        types: [terraform]
        pass_filenames: false
      - id: checkov
        name: checkov
        entry: checkov
        language: system
        args: [--quiet]
        types: [terraform]
        pass_filenames: false

  # Shell script linting
  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        types: [shell]
        args: [-S, warning]
        pass_filenames: false