global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@astra-os.io'
  smtp_auth_username: 'alerts@astra-os.io'
  smtp_auth_password: '${ALERTMANAGER_SMTP_PASSWORD:?must be set}'

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
      continue: true
    - match:
        severity: warning
      receiver: 'warning-alerts'
      continue: true

receivers:
  - name: 'default'
    email_configs:
      - to: 'oncall@astra-os.io'
        send_resolved: true
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL:?must be set}'
        channel: '#alerts'
        send_resolved: true
        title: 'Astra OS Alert'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'

  - name: 'critical-alerts'
    email_configs:
      - to: 'oncall-critical@astra-os.io'
        send_resolved: true
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL:?must be set}'
        channel: '#critical-alerts'
        send_resolved: true
        title: '🚨 CRITICAL: Astra OS Alert'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
    pagerduty_configs:
      - service_key: '${PAGERDUTY_SERVICE_KEY:?must be set}'
        severity: critical
        description: '{{ .GroupLabels.alertname }}'

  - name: 'warning-alerts'
    email_configs:
      - to: 'oncall-warning@astra-os.io'
        send_resolved: true
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL:?must be set}'
        channel: '#warning-alerts'
        send_resolved: true
        title: '⚠️ WARNING: Astra OS Alert'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster', 'service']