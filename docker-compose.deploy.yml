version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: astra-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-astra}
      POSTGRES_USER: ${POSTGRES_USER:-astra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?must be set}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astra"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: astra-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:?must be set}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: astraos-api:latest
    container_name: astra-api
    restart: always
    working_dir: /app/apps/api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-astra}:${POSTGRES_PASSWORD:?}@postgres:5432/astra
      REDIS_URL: redis://:${REDIS_PASSWORD:?}@redis:6379/0
      ENVIRONMENT: staging
      DEBUG: "false"
      SECRET_KEY: ${SECRET_KEY:?must be set}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    command: >
      sh -c "cd /app/apps/api && python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"

  web:
    image: astraos-web:latest
    container_name: astra-web
    restart: always
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NODE_ENV: production
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5

volumes:
  pgdata:
  redis_data:
