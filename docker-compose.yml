# ============================================================
# ASTRA OS - Development Docker Compose
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: astra-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: astra
      POSTGRES_USER: astra
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-astra_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astra"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: astra-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-astra_dev}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-astra_dev}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.24
    container_name: astra-temporal
    ports:
      - "7233:7233"
      - "8233:8233"
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_SEEDS: postgres
      POSTGRES_USER: astra
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-astra_dev}
      POSTGRES_DB: astra_temporal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health --address $$(hostname -i):7233"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile.dev
    container_name: astra-api
    ports:
      - "8000:8000"
    env_file:
      - docker/dev/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://astra:${POSTGRES_PASSWORD:-astra_dev}@postgres:5432/astra
      REDIS_URL: redis://:${REDIS_PASSWORD:-astra_dev}@redis:6379/0
      TEMPORAL_HOST: temporal:7233
      CORS_ORIGINS: http://localhost:3000
      ENVIRONMENT: development
      DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
    volumes:
      - ./apps/api/app:/app/app
      - ./apps/api/alembic:/app/alembic
      - ./apps/api/alembic.ini:/app/alembic.ini
      - ./scripts:/app/scripts
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3
    command: >
      sh -c "
        cd /app &&
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

volumes:
  postgres_data:
  redis_data:
